services:
  php:
    image: php:8.5-fpm-alpine
    volumes:
      - ./app:/var/www/html
      - data:/var/www/html/data
    working_dir: /var/www/html
    restart: unless-stopped

  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html:ro
      - ./app/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - php
    restart: unless-stopped

volumes:
  data:
