<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>QR Code Generator + Export</title>
	<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
	<style>
		:root {
			color-scheme: light;
			font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
		}

		body {
			margin: 0;
			padding: 20px;
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: flex-start;
			background: #f4f7fb;
		}

		.app {
			width: min(1080px, 100%);
			display: grid;
			gap: 18px;
			grid-template-columns: 1fr 1fr;
		}

		.panel {
			background: white;
			border-radius: 14px;
			box-shadow: 0 8px 20px rgba(20, 30, 70, 0.1);
			padding: 20px;
			display: flex;
			flex-direction: column;
			gap: 16px;
		}

		.panel h2 {
			margin: 0;
			font-size: 1.1rem;
			font-weight: 600;
			color: #1f2b44;
		}

		.field {
			display: grid;
			gap: 8px;
		}

		.field label {
			font-size: .88rem;
			color: #344054;
		}

		.field.checkbox-field {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			font-size: .88rem;
			color: #344054;
			cursor: pointer;
		}

		.field input,
		.field select,
		.field textarea {
			padding: 10px 12px;
			border: 1px solid #dce5f2;
			border-radius: 8px;
			font-size: 1rem;
			width: 100%;
			box-sizing: border-box;
			outline: none;
		}

		.field input[type="checkbox"] {
			width: auto;
			height: auto;
			padding: 0;
			margin-right: 8px;
			border: 0;
			background: none;
		}

		.checkbox-field {
			display: inline-flex;
			align-items: center;
			gap: 6px;
		}

		.color-row input[type="color"] {
			width: 2.5em;
			height: 2.5em;
			padding: 0;
			border-radius: 8px;
			border: 1px solid #dce5f2;
			background: none;
			appearance: none;
		}

		.color-row input[type="color"]::-webkit-color-swatch-wrapper {
			padding: 0;
		}

		.color-row input[type="color"]::-webkit-color-swatch {
			border: 0;
			border-radius: 6px;
		}

		.field textarea {
			resize: vertical;
			min-height: 80px;
		}

		.hint-text {
			color: #64748b;
			font-size: 0.9rem;
		}

		.shortener-area {
			display: flex;
			flex-direction: column;
			gap: 8px;
		}

		.shortener-actions {
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
		}

		.shortener-actions button,
		.shortener-actions input {
			padding: 8px 12px;
			border-radius: 8px;
		}

		.shortener-actions input {
			border: 1px solid #dce5f2;
			width: 100%;
			min-width: 160px;
		}

		.shortener-info {
			color: #475569;
			font-size: 0.87rem;
		}

		.color-row {
			display: flex;
			gap: 12px;
			align-items: center;
			flex-wrap: wrap;
		}

		.color-row .field {
			flex: 1 1 48%;
			min-width: 140px;
		}

		.button-row {
			display: flex;
			gap: 12px;
			flex-wrap: wrap;
		}

		.button-row button,
		.shortener-actions button {
			background: #2563eb;
			border: 0;
			border-radius: 8px;
			color: white;
			padding: 10px 14px;
			font-weight: 600;
			cursor: pointer;
			transition: filter .2s ease;
		}

		.button-row button:hover,
		.shortener-actions button:hover {
			filter: brightness(1.08);
		}

		.secondary {
			background: #64748b;
		}

		.offer {
			margin-top: 16px;
			color: #475569;
			font-size: .82rem;
		}

		#output-wrapper {
			min-height: 380px;
			display: flex;
			justify-content: center;
			align-items: center;
			border: 2px dashed #d9e2ef;
			border-radius: 12px;
			background: #f8fafc;
			padding: 14px;
			text-align: center;
			position: relative;
			overflow: hidden;
		}

		#output-canvas,
		#output-svg {
			display: block;
			max-width: 100%;
			max-height: 100%;
			width: auto;
			height: auto;
			box-sizing: border-box;
			border-radius: 8px;
			background: white;
		}

		#output-canvas {
			box-shadow: 0 8px 18px rgba(12, 38, 67, 0.08);
		}

		#output-svg {
			position: absolute;
			left: -9999px;
			width: 1px;
			height: 1px;
			visibility: hidden;
		}

		.hidden {
			display: none !important;
		}

		@media (max-width: 960px) {
			.app {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>

<body>
	<main class="app">
		<section class="panel" aria-label="QR input panel">
			<h2>Enter QR content</h2>
			<div class="field">
				<label for="text-input">Text / URL</label>
				<textarea id="text-input" placeholder="Type URL or text here" rows="3"></textarea>
			</div>
			<div class="field">
				<label for="size-input">Size (px)</label>
				<input id="size-input" type="number" min="80" max="1200" value="320" />
			</div>
			<div class="color-row">
				<div class="field">
					<label for="fg-input">Foreground color</label>
					<input id="fg-input" type="color" value="#0f172a" />
				</div>
				<div class="field">
					<label for="bg-input">Background color</label>
					<input id="bg-input" type="color" value="#ffffff" />
				</div>
			</div>

			<div class="field checkbox-field">
				<label for="shadow-input">
					<input id="shadow-input" type="checkbox" />
					Add drop shadow
				</label>
			</div>

			<div class="field">
				<label for="padding-input">Padding (px)</label>
				<input id="padding-input" type="range" min="0" max="80" value="8" />
				<small id="padding-value" class="hint-text">8px</small>
			</div>

			<div class="button-row">
				<button id="generate-btn">Generate QR</button>
				<button id="download-png-btn" class="secondary">Download PNG</button>
				<button id="download-jpg-btn" class="secondary">Download JPG</button>
				<button id="download-svg-btn" class="secondary">Download SVG</button>
			</div>

			<p class="offer">For best results, choose content under 300 characters and size >= 240.</p>
		</section>

		<section class="panel" aria-label="URL shortener panel">
			<h2>Shorten URL</h2>
			<div class="field shortener-area">
				<input id="shorten-output" type="text" readonly placeholder="Short URL appears here" />
				<div class="shortener-actions">
					<button id="shorten-btn" class="secondary">Shorten URL (4 chars)</button>
					<button id="apply-short-url-btn" class="secondary">Use short URL in QR + clear input</button>
					<button id="copy-short-url-btn" class="secondary">Copy Short URL</button>
					<button href="links.html" class="secondary">View all links table</button>
				</div>
				<small id="shorten-status" class="shortener-info">Post and create a short link.</small>
			</div>
		</section>

		<section class="panel" aria-label="QR output panel">
			<h2>Output preview</h2>
			<div id="output-wrapper">
				<canvas id="output-canvas" width="320" height="320" aria-label="QR code canvas"></canvas>
				<div id="output-svg" class="hidden" aria-label="QR code SVG"></div>
			</div>
		</section>

		<section class="panel" aria-label="All short links table">
			<h2>All shortened links</h2>
			<div class="shortener-actions">
				<button id="load-links-btn" class="secondary">Load all links</button>
				<button id="refresh-links-btn" class="secondary">Refresh</button>
			</div>
			<div class="field" style="overflow-x:auto;">
				<table id="links-table" style="width:100%; border-collapse:collapse; margin-top:10px; display:none;">
					<thead>
						<tr>
							<th style="text-align:left;padding:8px;border-bottom:1px solid #dce5f2;">Code</th>
							<th style="text-align:left;padding:8px;border-bottom:1px solid #dce5f2;">Original URL</th>
							<th style="text-align:left;padding:8px;border-bottom:1px solid #dce5f2;">Short URL</th>
							<th style="text-align:left;padding:8px;border-bottom:1px solid #dce5f2;">Created</th>
						</tr>
					</thead>
					<tbody id="links-table-body"></tbody>
				</table>
				<p id="links-status" class="offer">Click “Load all links” to display the table.</p>
			</div>
		</section>
	</main>

	<script>
		const textInput = document.getElementById('text-input');
		const sizeInput = document.getElementById('size-input');
		const fgInput = document.getElementById('fg-input');
		const bgInput = document.getElementById('bg-input');
		const shadowInput = document.getElementById('shadow-input');
		const paddingInput = document.getElementById('padding-input');
		const paddingValue = document.getElementById('padding-value');

		const generateBtn = document.getElementById('generate-btn');
		const pngBtn = document.getElementById('download-png-btn');
		const jpgBtn = document.getElementById('download-jpg-btn');
		const svgBtn = document.getElementById('download-svg-btn');

		const canvas = document.getElementById('output-canvas');
		const svgWrapper = document.getElementById('output-svg');
		let latestSvgString = '';


		function renderQRCode() {
			const text = textInput.value.trim();
			const size = Number(sizeInput.value) || 320;
			const colorDark = fgInput.value;
			const colorLight = bgInput.value;

			if (!text) {
				canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
				latestSvgString = '';
				svgWrapper.innerHTML = '';
				svgWrapper.classList.add('hidden');
				return;
			}

			const padding = Math.max(0, Number(paddingInput.value) || 0);
			const drawingSize = Math.max(0, size - padding * 2);

			canvas.width = size;
			canvas.height = size;

			const tempCanvas = document.createElement('canvas');
			tempCanvas.width = drawingSize;
			tempCanvas.height = drawingSize;

			QRCode.toCanvas(tempCanvas, text, {
				width: drawingSize,
				margin: 1,
				color: { dark: colorDark, light: colorLight }
			}, function (error) {
				if (error) {
					console.error('QR render failed', error);
					alert('Error generating QR code: ' + error.message);
					return;
				}

				const ctx = canvas.getContext('2d');
				ctx.clearRect(0, 0, size, size);

				const effectivePadding = Math.min(padding, size / 6, (size - drawingSize) / 2);

				if (shadowInput.checked) {
					ctx.save();
					ctx.shadowColor = 'rgba(0,0,0,0.28)';
					ctx.shadowBlur = 16;
					ctx.shadowOffsetX = 0;
					ctx.shadowOffsetY = 6;
					ctx.fillStyle = '#ffffff';
					ctx.fillRect(effectivePadding, effectivePadding, drawingSize, drawingSize);
					ctx.restore();
				}

				ctx.drawImage(tempCanvas, effectivePadding, effectivePadding, drawingSize, drawingSize);
			});

			QRCode.toString(text, { type: 'svg', width: size, margin: 1, color: { dark: colorDark, light: colorLight } }, function (err, svgString) {
				if (err) {
					console.error('SVG render failed', err);
					return;
				}
				latestSvgString = svgString;
				svgWrapper.innerHTML = svgString;
				svgWrapper.classList.add('hidden');
			});
		}

		function downloadDataURL(dataURL, filename) {
			const link = document.createElement('a');
			link.href = dataURL;
			link.download = filename;
			document.body.appendChild(link);
			link.click();
			document.body.removeChild(link);
		}

		function downloadSVG(filename) {
			if (!latestSvgString) {
				return alert('Please generate a QR code first.');
			}

			const blob = new Blob([latestSvgString], { type: 'image/svg+xml;charset=utf-8' });
			const url = URL.createObjectURL(blob);
			const link = document.createElement('a');
			link.href = url;
			link.download = filename;
			document.body.appendChild(link);
			link.click();
			document.body.removeChild(link);
			URL.revokeObjectURL(url);
		}

		function parseQueryParams() {
			const params = new URLSearchParams(window.location.search);
			if (params.has('text')) textInput.value = params.get('text');
			if (params.has('size')) sizeInput.value = params.get('size');
			if (params.has('fg')) fgInput.value = params.get('fg');
			if (params.has('bg')) bgInput.value = params.get('bg');
			if (params.has('padding')) paddingInput.value = params.get('padding');
			if (params.has('shadow')) {
				const val = params.get('shadow');
				shadowInput.checked = (val === '1' || val?.toLowerCase() === 'true');
			}
			paddingValue.innerText = `${paddingInput.value}px`;
			return {
				filetype: params.get('filetype')?.toLowerCase(),
				download: params.get('download') !== '0'
			};
		}

		function attemptAutoDownload(filetype) {
			if (!filetype) return;
			const type = filetype.toLowerCase();
			if (type === 'png') {
				const dataUrl = canvas.toDataURL('image/png');
				downloadDataURL(dataUrl, 'qrcode.png');
			} else if (type === 'jpg' || type === 'jpeg') {
				const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
				downloadDataURL(dataUrl, 'qrcode.jpg');
			} else if (type === 'svg') {
				downloadSVG('qrcode.svg');
			} else {
				console.warn('Unsupported filetype specified in query:', filetype);
			}
		}

		generateBtn.addEventListener('click', renderQRCode);

		// Live preview while typing/adjusting parameters
		textInput.addEventListener('input', renderQRCode);
		sizeInput.addEventListener('input', renderQRCode);
		fgInput.addEventListener('input', renderQRCode);
		bgInput.addEventListener('input', renderQRCode);
		shadowInput.addEventListener('change', renderQRCode);

		paddingInput.addEventListener('input', () => {
			paddingValue.innerText = `${paddingInput.value}px`;
			renderQRCode();
		});

		pngBtn.addEventListener('click', () => {
			if (!textInput.value.trim()) { return alert('Add text or URL first.'); }
			const dataUrl = canvas.toDataURL('image/png');
			downloadDataURL(dataUrl, 'qrcode.png');
		});

		jpgBtn.addEventListener('click', () => {
			if (!textInput.value.trim()) { return alert('Add text or URL first.'); }
			const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
			downloadDataURL(dataUrl, 'qrcode.jpg');
		});

		svgBtn.addEventListener('click', () => {
			if (!textInput.value.trim()) { return alert('Add text or URL first.'); }
			downloadSVG('qrcode.svg');
		});

		const shortenBtn = document.getElementById('shorten-btn');
		const applyShortUrlBtn = document.getElementById('apply-short-url-btn');
		const shortenOutput = document.getElementById('shorten-output');
		const copyShortUrlBtn = document.getElementById('copy-short-url-btn');
		const shortenStatus = document.getElementById('shorten-status');

		async function shortenUrl() {
			const original = textInput.value.trim();
			if (!original) return alert('Enter the URL or text to shorten first.');

			shortenStatus.textContent = 'Shortening...';

			try {
				const res = await fetch('/shorten.php', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ url: original })
				});

				if (!res.ok) {
					const err = await res.json().catch(() => { });
					throw new Error(err?.error || 'Shortener request failed');
				}

				const data = await res.json();
				shortenOutput.value = data.short_url;
				textInput.value = data.short_url;
				renderQRCode();
				shortenStatus.textContent = 'Short URL generated successfully.';
			} catch (error) {
				console.error(error);
				shortenStatus.textContent = 'Error: ' + error.message;
				alert('Shortener error: ' + error.message);
			}
		}

		shortenBtn.addEventListener('click', shortenUrl);

		copyShortUrlBtn.addEventListener('click', () => {
			if (!shortenOutput.value) return alert('No short URL to copy.');
			navigator.clipboard.writeText(shortenOutput.value).then(() => {
				shortenStatus.textContent = 'Copied short URL to clipboard!';
			}).catch((err) => {
				shortenStatus.textContent = 'Clipboard error';
				console.error(err);
			});
		});

		applyShortUrlBtn.addEventListener('click', () => {
			if (!shortenOutput.value) return alert('Generate and set a shortened URL first.');
			textInput.value = shortenOutput.value;
			shortenStatus.textContent = 'Short URL applied and input cleared.';
			setTimeout(() => {
				textInput.value = '';
				renderQRCode();
			}, 100);
		});

		const linksTable = document.getElementById('links-table');
		const linksTableBody = document.getElementById('links-table-body');
		const linksStatus = document.getElementById('links-status');
		const loadLinksBtn = document.getElementById('load-links-btn');
		const refreshLinksBtn = document.getElementById('refresh-links-btn');

		async function loadAllLinks() {
			linksStatus.textContent = 'Loading links...';
			linksTable.style.display = 'none';
			linksTableBody.innerHTML = '';

			try {
				const res = await fetch('/api/links');
				if (!res.ok) throw new Error('Failed to fetch links');
				const json = await res.json();
				const items = json.data || [];

				if (!items.length) {
					linksStatus.textContent = 'No links have been shortened yet.';
					return;
				}

				for (const item of items) {
					const tr = document.createElement('tr');
					tr.innerHTML = `
						<td style="padding:8px;border-bottom:1px solid #eee;">${item.code}</td>
						<td style="padding:8px;border-bottom:1px solid #eee;"><a href="${item.url}" target="_blank" rel="noopener">${item.url}</a></td>
						<td style="padding:8px;border-bottom:1px solid #eee;"><a href="/s/${item.code}" target="_blank" rel="noopener">/s/${item.code}</a></td>
						<td style="padding:8px;border-bottom:1px solid #eee;">${new Date(item.created_at).toLocaleString()}</td>
					`;
					linksTableBody.appendChild(tr);
				}

				linksTable.style.display = 'table';
				linksStatus.textContent = `Loaded ${items.length} link${items.length !== 1 ? 's' : ''}.`;
			} catch (err) {
				console.error(err);
				linksStatus.textContent = 'Error loading links: ' + err.message;
			}
		}

		loadLinksBtn.addEventListener('click', loadAllLinks);
		refreshLinksBtn.addEventListener('click', loadAllLinks);

		// Generate initial example QR code (and support GET config / download)
		window.addEventListener('DOMContentLoaded', () => {
			const query = parseQueryParams();
			renderQRCode();
			if (query.filetype && query.download !== false) {
				// allow render to finish before downloading
				setTimeout(() => attemptAutoDownload(query.filetype), 250);
			}
		});
	</script>
</body>

</html>
